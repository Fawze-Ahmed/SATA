    function botReply(query) {

      const ar = lang === "ar";
      if (ar && /تأسيس|شرك|رخص|إقامة/.test(text)) return "نستطيع ترتيب التأسيس القانوني، الرخص، والإقامة بسرعة مع مسار واضح لاستقرار أعمالك في دبي.";

      if (ar && /عقار|مقر|سكن/.test(text)) return "نقدم تحليل عقاري واستشارات مقر فندقي أو مكتبي مخصص لاحتياجات استثمارك في دبي.";
      if (!ar && /(real estate|office|property)/.test(text)) return "We provide property analysis and headquarters consulting tailored for your Dubai investment needs.";
      if (ar && /بوت|شات|ذكاء/.test(text)) return "نصمم شات بوتات ذكية، أتمتة، وربط واتساب لتجعل تفاعل العميل سريعاً واحترافياً.";
      if (!ar && /(bot|chat|ai|automation)/.test(text)) return "We design smart chatbots, automation, and WhatsApp integration to make client interaction fast and professional.";
      if (ar && /واتساب|تواصل/.test(text)) return "استخدم زر واتساب للتواصل المباشر، وسنجهز لك مسار الوصول أو الاستشارة فوراً.";
      if (!ar && /(whatsapp|contact)/.test(text)) return "Use the WhatsApp button for direct contact, and we will prepare the arrival or consultation path immediately.";
      return ar ? "سأجيبك بعد قليل. أخبرني إن كنت تريد استقبال VIP، تأسيس شركة، عقار، تقنية، أو فنتك." : "I will answer shortly. Tell me if you want VIP arrival, company setup, real estate, tech, or fintech.";
    }

    function addMessage(text, type = "bot") {

      msg.textContent = text;
      messages.appendChild(msg);
      messages.scrollTop = messages.scrollHeight;
    }
